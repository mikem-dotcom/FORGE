<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mike's Workout App</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0d0f12;--bg2:#161920;--bg3:#1e2229;--card:#1a1d24;
    --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
    --accent:#e8ff47;--accent2:#47ffd0;--red:#ff4757;
    --text:#f0f2f5;--muted:#7a8494;--muted2:#4a5060;
    --green:#2dbe8a;--green-bg:rgba(45,190,138,0.1);
    --amber:#ffb84d;--amber-bg:rgba(255,184,77,0.1);
    --blue:#5b9cf6;--blue-bg:rgba(91,156,246,0.1);
    --radius:14px;--radius-sm:8px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Barlow',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
  .app{max-width:500px;margin:0 auto;padding:0 16px 100px;}
  .screen{display:none;animation:fadeUp 0.22s ease;}
  .screen.active{display:block;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}

  .topbar{display:flex;align-items:center;justify-content:space-between;padding:20px 0 16px;border-bottom:1px solid var(--border);margin-bottom:24px;}
  .topbar-logo{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:22px;letter-spacing:0.04em;text-transform:uppercase;color:var(--accent);}
  .topbar-sub{font-size:13px;color:var(--muted);}

  .btn-back{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--muted);background:none;border:none;cursor:pointer;padding:8px 0;margin-bottom:6px;transition:color 0.15s;font-family:'Barlow',sans-serif;}
  .btn-back:hover{color:var(--text);}

  .page-header{margin-bottom:22px;}
  .page-header h1{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:36px;text-transform:uppercase;letter-spacing:0.02em;line-height:1;margin-bottom:4px;}
  .page-header p{font-size:14px;color:var(--muted);}

  .month-section{margin-bottom:30px;}
  .month-label{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;padding-left:2px;}
  .workout-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .workout-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;cursor:pointer;transition:border-color 0.2s,transform 0.15s,background 0.2s;position:relative;overflow:hidden;}
  .workout-card::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent);transform:scaleX(0);transform-origin:left;transition:transform 0.2s;}
  .workout-card:hover{border-color:var(--border2);transform:translateY(-2px);background:var(--bg3);}
  .workout-card:hover::after{transform:scaleX(1);}
  .workout-card.has-log{border-color:rgba(45,190,138,0.35);}
  .workout-card.has-log::after{background:var(--green);transform:scaleX(1);}
  .card-num{font-size:11px;color:var(--muted2);margin-bottom:5px;font-weight:500;}
  .card-title{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;text-transform:uppercase;letter-spacing:0.02em;margin-bottom:8px;}
  .card-tags{display:flex;flex-wrap:wrap;gap:5px;}
  .badge{display:inline-block;font-size:10px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;padding:3px 7px;border-radius:4px;}
  .badge-metcon{background:var(--blue-bg);color:var(--blue);}
  .badge-fbb{background:var(--green-bg);color:var(--green);}
  .badge-mobility{background:var(--amber-bg);color:var(--amber);}
  .badge-cooldown{background:var(--blue-bg);color:var(--blue);}
  .prev-log{font-size:11px;color:var(--green);margin-top:8px;padding-top:8px;border-top:1px solid rgba(45,190,138,0.2);}

  .progress-track{height:3px;background:var(--border);border-radius:2px;margin-bottom:24px;overflow:hidden;}
  .progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width 0.3s ease;}
  .warmup-list{list-style:none;}
  .warmup-item{display:flex;align-items:center;gap:14px;padding:13px 0;border-bottom:1px solid var(--border);cursor:pointer;transition:opacity 0.15s;}
  .warmup-item:last-child{border-bottom:none;}
  .warmup-item:hover{opacity:0.8;}
  .warmup-check{width:24px;height:24px;border-radius:50%;border:1.5px solid var(--muted2);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all 0.2s;}
  .warmup-item.done .warmup-check{background:var(--accent);border-color:var(--accent);}
  .chk{display:none;width:13px;height:13px;color:#0d0f12;}
  .warmup-item.done .chk{display:block;}
  .warmup-text{font-size:15px;color:var(--text);transition:color 0.15s;}
  .warmup-item.done .warmup-text{color:var(--muted);text-decoration:line-through;}

  .section-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:14px;}
  .section-label{font-size:11px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:14px;}
  .lbl-accent{color:var(--accent);}
  .lbl-green{color:var(--green);}

  .amrap-title{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:700;text-transform:uppercase;color:var(--accent);margin-bottom:4px;}
  .amrap-rest{font-size:13px;color:var(--muted);margin-bottom:14px;}
  .exercise-list{font-size:14px;color:var(--muted);line-height:2.1;white-space:pre-line;margin-bottom:18px;border-left:2px solid var(--border2);padding-left:14px;}

  .rounds-wrap{display:flex;align-items:center;gap:14px;margin-bottom:16px;}
  .round-num{font-family:'Barlow Condensed',sans-serif;font-size:64px;font-weight:900;line-height:1;color:var(--accent);min-width:70px;}
  .round-label{font-size:13px;color:var(--muted);line-height:1.4;}
  .round-btns{display:flex;gap:8px;margin-left:auto;}

  .timer-wrap{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:18px;text-align:center;display:none;}
  .timer-num{font-family:'Barlow Condensed',sans-serif;font-size:52px;font-weight:900;color:var(--accent2);font-variant-numeric:tabular-nums;line-height:1;}
  .timer-sub{font-size:12px;color:var(--muted);margin-top:4px;letter-spacing:0.05em;text-transform:uppercase;}
  .timer-bar-track{height:3px;background:var(--border);border-radius:2px;margin-top:14px;overflow:hidden;}
  .timer-bar-fill{height:100%;background:var(--accent2);border-radius:2px;transition:width 1s linear;}

  .superset-wrap{margin-bottom:20px;padding-bottom:20px;border-bottom:1px solid var(--border);}
  .superset-wrap:last-child{margin-bottom:0;padding-bottom:0;border-bottom:none;}
  .superset-title{font-size:11px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--accent);margin-bottom:14px;}
  .fbb-note{font-size:12px;color:var(--muted);margin-bottom:16px;font-style:italic;}
  .exercise-block{margin-bottom:18px;}
  .exercise-block:last-child{margin-bottom:0;}
  .exercise-title{font-size:14px;font-weight:600;color:var(--text);margin-bottom:10px;}
  .set-row{display:flex;align-items:center;gap:8px;margin-bottom:7px;}
  .set-tag{font-size:11px;color:var(--muted);min-width:40px;font-weight:500;}
  .set-input{width:76px;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius-sm);color:var(--text);font-size:14px;font-family:'Barlow',sans-serif;padding:7px 10px;transition:border-color 0.2s;-moz-appearance:textfield;}
  .set-input::-webkit-inner-spin-button,.set-input::-webkit-outer-spin-button{-webkit-appearance:none;}
  .set-input:focus{outline:none;border-color:var(--accent);}
  .set-input.prefilled{border-color:rgba(45,190,138,0.5);background:rgba(45,190,138,0.06);}
  .set-sep{font-size:13px;color:var(--muted2);}

  .note-box{border-radius:var(--radius-sm);padding:12px 14px;font-size:14px;margin-bottom:12px;display:flex;gap:10px;align-items:flex-start;line-height:1.6;}
  .note-box.mobility{background:var(--amber-bg);color:var(--amber);border:1px solid rgba(255,184,77,0.2);}
  .note-box.cooldown{background:var(--blue-bg);color:var(--blue);border:1px solid rgba(91,156,246,0.2);}
  .note-box.prev{background:rgba(45,190,138,0.08);color:var(--green);border:1px solid rgba(45,190,138,0.2);font-size:13px;margin-bottom:14px;}

  .btn{display:inline-flex;align-items:center;gap:7px;padding:10px 18px;font-size:14px;font-weight:600;font-family:'Barlow',sans-serif;border-radius:var(--radius-sm);border:1px solid var(--border2);background:var(--bg3);color:var(--text);cursor:pointer;transition:all 0.15s;letter-spacing:0.02em;}
  .btn:hover{background:var(--bg2);}
  .btn:active{transform:scale(0.97);}
  .btn-accent{background:var(--accent);color:#0d0f12;border-color:var(--accent);font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;padding:12px 22px;}
  .btn-accent:hover{background:#d4eb2f;border-color:#d4eb2f;}
  .btn-green{background:var(--green);color:#0d0f12;border-color:var(--green);font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;text-transform:uppercase;letter-spacing:0.04em;}
  .btn-green:hover{background:#26a87a;border-color:#26a87a;}
  .btn-ghost{background:transparent;border-color:var(--border2);color:var(--muted);}
  .btn-ghost:hover{color:var(--text);background:var(--bg3);}
  .btn-danger{background:transparent;border-color:rgba(255,71,87,0.3);color:var(--red);font-size:13px;padding:8px 14px;}
  .btn-danger:hover{background:rgba(255,71,87,0.1);}
  .btn-row{display:flex;align-items:center;justify-content:flex-end;gap:10px;margin-top:20px;padding-top:16px;border-top:1px solid var(--border);}

  .done-wrap{text-align:center;padding:48px 0 32px;}
  .done-trophy{font-size:56px;margin-bottom:16px;}
  .done-title{font-family:'Barlow Condensed',sans-serif;font-size:42px;font-weight:900;text-transform:uppercase;color:var(--accent);letter-spacing:0.02em;margin-bottom:8px;}
  .done-sub{font-size:15px;color:var(--muted);margin-bottom:32px;}
  .log-summary{text-align:left;}
  .log-section-title{font-size:11px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;margin-top:16px;}
  .log-entry{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:8px;font-size:13px;color:var(--muted);line-height:1.7;}
  .log-entry strong{color:var(--text);font-weight:600;}
  .log-big{font-family:'Barlow Condensed',sans-serif;font-size:36px;font-weight:900;color:var(--accent);display:block;line-height:1;}
  .done-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:28px;}

  ::-webkit-scrollbar{width:4px;}
  ::-webkit-scrollbar-track{background:transparent;}
  ::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
</style>
</head>
<body>
<div class="app">

  <div id="home" class="screen active">
    <div class="topbar">
      <div class="topbar-logo">💪 Mike's Workouts</div>
      <div class="topbar-sub" id="home-count"></div>
    </div>
    <div id="workout-list"></div>
  </div>

  <div id="warmup-screen" class="screen">
    <button class="btn-back" onclick="goHome()">← Back</button>
    <div class="page-header"><h1>Warmup</h1><p>Check off each movement as you go</p></div>
    <div class="progress-track"><div class="progress-fill" id="warmup-progress" style="width:0%"></div></div>
    <ul class="warmup-list" id="warmup-list"></ul>
    <div class="btn-row"><button class="btn btn-accent" onclick="startWorkout()">Start Workout →</button></div>
  </div>

  <div id="workout-screen" class="screen">
    <button class="btn-back" onclick="showScreen('warmup-screen')">← Back to Warmup</button>
    <div class="page-header">
      <h1 id="ws-title">Workout</h1>
      <p id="ws-sub"></p>
    </div>
    <div id="workout-sections"></div>
    <div class="btn-row"><button class="btn btn-accent" onclick="finishWorkout()">Finish Workout ✓</button></div>
  </div>

  <div id="done-screen" class="screen">
    <div class="done-wrap">
      <div class="done-trophy">🏆</div>
      <div class="done-title">Crushed it!</div>
      <div class="done-sub" id="done-sub"></div>
      <div class="log-summary" id="done-summary"></div>
      <div class="done-btns">
        <button class="btn btn-accent" onclick="goHome()">Back to Workouts</button>
        <button class="btn btn-danger" onclick="clearLastLog()">Clear This Log</button>
      </div>
    </div>
  </div>

</div>
<script>

  "Air Squats — 10 @ 32X1","Hand-Release Pushups — 10","Mountain Climbers — 20",

];

      ]},

  ]},
  {month:"September / October",workouts:[
    {num:1,sections:[
      {type:"metcon",duration:"12-minute AMRAP",rest:30,exercises:["6 Pike Pushups","8 DB Thrusters","30 Battle Rope Waves","15sec Hollow Hold"]},
      {type:"fbb",note:"Functional Body Building Super Set",supersets:[

    ]},
    {num:3,sections:[
      {type:"fbb",note:"3 Separate Supersets",supersets:[
        {label:"Superset #1",exercises:[{name:"Seated DB Press",sets:4,reps:"10"},{name:"DB Shoulder Shrug",sets:4,reps:"10"}]},
        {label:"Superset #2",exercises:[{name:"Bench Press",sets:4,reps:"10"},{name:"Pullup/Chinup — hold chin over bar until failure",sets:4,reps:"—"}]},
        {label:"Superset #3 — 31X2 Tempos",exercises:[{name:"DB Tricep Skull Crushers",sets:4,reps:"10"},{name:"DB Hammer Curls",sets:4,reps:"10"}]}
      ]},

    ]},
    {num:4,sections:[

  {month:"August",workouts:[
    {num:1,sections:[
      {type:"metcon",duration:"15-minute AMRAP",rest:30,exercises:["8 Pushups","10 DB Bent-over Flys","12 Scissor Jump Lunges","14 Hollow Rocks"]},
      {type:"fbb",note:"Functional Body Building Super Set",supersets:[
        {label:"Superset",exercises:[

      ]},

      {type:"fbb",note:"Functional Body Building Super Set",supersets:[

    {num:3,sections:[

      {type:"fbb",note:"Functional Body Building Super Set",supersets:[

          {name:"DB Hammer Curls @ 32X1 Tempo",sets:4,reps:"10"}
        ]}
      ]},

    ]},
    {num:4,sections:[
      {type:"metcon",duration:"15-minute AMRAP",rest:30,exercises:["8 Burpees","10 Bent Over BB Rows","10 Goblet Squats","8 DB Side Bends (each side)"]},
      {type:"fbb",note:"Functional Body Building Super Set",supersets:[

    {num:5,sections:[
      {type:"metcon",duration:"15-minute AMRAP",rest:30,exercises:["8 Pike Pushups","10 Empty BB Upright Rows","10 BB Deadlifts","10 Hanging Knee Raises"]},
      {type:"fbb",note:"Functional Body Building Super Set",supersets:[
        {label:"Superset",exercises:[
          {name:"Pullup/Chinup — hold til failure",sets:4,reps:"failure"},
          {name:"Plank — hold til failure",sets:4,reps:"failure"}

];

let curMI=-1,curWI=-1,curWorkout=null,curKey=null,lastKey=null;
let warmupChecked=[],metconRounds={};
let timerInterval=null,timerRunning=false,activeTimerSI=-1;

function sk(m,n){return'wk:'+m.replace(/[\s\/]+/g,'-')+':'+n;}
function save(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
function load(k){try{const v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch(e){return null;}}
function del(k){try{localStorage.removeItem(k);}catch(e){}}
function fmtDate(ts){return ts?new Date(ts).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}):''}

function goHome(){clearTimer();metconRounds={};warmupChecked=[];curWorkout=null;curKey=null;renderHome();showScreen('home');}
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');window.scrollTo(0,0);}

function badges(w){
  const t=new Set(w.sections.map(s=>s.type));
  return[t.has('metcon')?'<span class="badge badge-metcon">MetCon</span>':'',
    t.has('fbb')?'<span class="badge badge-fbb">Bodybuilding</span>':'',
    t.has('mobility')?'<span class="badge badge-mobility">Mobility</span>':'',
    t.has('cooldown')?'<span class="badge badge-cooldown">Cool Down</span>':''].join('');
}

function renderHome(){
  let total=0;
  MONTHS.forEach(m=>m.workouts.forEach(w=>{if(load(sk(m.month,w.num)))total++;}));
  document.getElementById('home-count').textContent=total>0?total+' workout'+(total!==1?'s':'')+' logged':'';
  document.getElementById('workout-list').innerHTML=MONTHS.map(m=>`
    <div class="month-section">
      <div class="month-label">${m.month}</div>
      <div class="workout-grid">
        ${m.workouts.map((w,i)=>{
          const key=sk(m.month,w.num);const log=load(key);
          const rnds=log?.rounds?Object.values(log.rounds).map(r=>r+'r').join(' / '):'';
          const prev=log?`<div class="prev-log">✓ ${rnds?rnds+' · ':''}${fmtDate(log.date)}</div>`:'';
          return`<div class="workout-card${log?' has-log':''}" onclick="selectWorkout(${MONTHS.indexOf(m)},${i})">
            <div class="card-num">${m.month}</div>
            <div class="card-title">Workout #${w.num}</div>
            <div class="card-tags">${badges(w)}</div>${prev}</div>`;
        }).join('')}
      </div>
    </div>`).join('');
}

function selectWorkout(mi,wi){
  curMI=mi;curWI=wi;curWorkout=MONTHS[mi].workouts[wi];
  curKey=sk(MONTHS[mi].month,curWorkout.num);
  metconRounds={};warmupChecked=new Array(WARMUP.length).fill(false);
  renderWarmup();showScreen('warmup-screen');
}

function renderWarmup(){
  const done=warmupChecked.filter(Boolean).length;
  document.getElementById('warmup-progress').style.width=Math.round(done/WARMUP.length*100)+'%';
  document.getElementById('warmup-list').innerHTML=WARMUP.map((ex,i)=>`
    <li class="warmup-item${warmupChecked[i]?' done':''}" onclick="toggleWarmup(${i})">
      <div class="warmup-check"><svg class="chk" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"/></svg></div>
      <span class="warmup-text">${ex}</span></li>`).join('');
}
function toggleWarmup(i){warmupChecked[i]=!warmupChecked[i];renderWarmup();}

function startWorkout(){
  document.getElementById('ws-title').textContent='Workout #'+curWorkout.num;
  document.getElementById('ws-sub').textContent=MONTHS[curMI].month;
  buildWorkoutSections();
  showScreen('workout-screen');
}

function buildWorkoutSections(){
  const log=load(curKey);
  document.getElementById('workout-sections').innerHTML=
    curWorkout.sections.map((sec,si)=>renderSection(sec,si,log)).join('');
}

function renderSection(sec,si,log){
  if(sec.type==='metcon') return renderMetcon(sec,si,log);
  if(sec.type==='fbb') return renderFbb(sec,si,log);
  if(sec.type==='mobility') return`<div class="note-box mobility">🧘 <span><strong>Mobility:</strong><br>${sec.text.replace(/\n/g,'<br>')}</span></div>`;
  if(sec.type==='cooldown') return`<div class="note-box cooldown">🚶 <span><strong>Cool Down:</strong> ${sec.text}</span></div>`;
  return'';
}

function renderMetcon(sec,si,log){
  const prev=log?.rounds?.[si]!==undefined
    ?`<div class="note-box prev">📋 Last time: <strong>${log.rounds[si]} rounds</strong> — ${fmtDate(log.date)}</div>`:'';
  return`<div class="section-card">
    <div class="section-label lbl-accent">Metabolic Conditioning</div>
    <div class="amrap-title">${sec.duration}</div>
    <div class="amrap-rest">*${sec.rest}sec walking rest between rounds</div>
    <div class="exercise-list">${sec.exercises.join('\n')}</div>
    ${prev}
    <div class="rounds-wrap">
      <div><div class="round-num" id="rc-${si}">0</div><div class="round-label">rounds<br>completed</div></div>
      <div class="round-btns">
        <button class="btn btn-green" onclick="addRound(${si},${sec.rest})">+ Round Done</button>
        <button class="btn btn-ghost" onclick="undoRound(${si})">↩</button>
      </div>
    </div>
    <div class="timer-wrap" id="tw-${si}">
      <div class="timer-num" id="td-${si}">0:${String(sec.rest).padStart(2,'0')}</div>
      <div class="timer-sub">Rest — get ready for next round</div>
      <div class="timer-bar-track"><div class="timer-bar-fill" id="tf-${si}" style="width:100%"></div></div>
    </div>
  </div>`;
}

function renderFbb(sec,si,log){
  const ssHtml=sec.supersets.map((ss,ssi)=>{
    const exHtml=ss.exercises.map((ex,exi)=>{
      const rows=Array.from({length:ex.sets},(_,ri)=>{
        const p=log?.sets?.[si]?.[ssi]?.[exi]?.[ri]||{};
        const cls=(p.w||p.r)?' prefilled':'';
        return`<div class="set-row">
          <span class="set-tag">Set ${ri+1}</span>
          <input class="set-input${cls}" id="w-${si}-${ssi}-${exi}-${ri}" type="number" placeholder="lbs" value="${p.w||''}">
          <span class="set-sep">×</span>
          <input class="set-input${cls}" id="r-${si}-${ssi}-${exi}-${ri}" type="number" placeholder="${ex.reps}" value="${p.r||''}">
        </div>`;
      }).join('');
      return`<div class="exercise-block"><div class="exercise-title">${ex.name}</div>${rows}</div>`;
    }).join('');
    return`<div class="superset-wrap"><div class="superset-title">${ss.label}</div>${exHtml}</div>`;
  }).join('');
  return`<div class="section-card">
    <div class="section-label lbl-green">Functional Bodybuilding</div>
    ${sec.note?`<div class="fbb-note">*${sec.note}</div>`:''}
    ${ssHtml}
  </div>`;
}

function addRound(si,rest){
  if(timerRunning)return;
  metconRounds[si]=(metconRounds[si]||0)+1;
  document.getElementById('rc-'+si).textContent=metconRounds[si];
  startTimer(rest,si);
}
function undoRound(si){
  if((metconRounds[si]||0)>0)metconRounds[si]--;
  document.getElementById('rc-'+si).textContent=metconRounds[si]||0;
  clearTimer();
  document.getElementById('tw-'+si).style.display='none';
}
function startTimer(secs,si){
  clearTimer();timerRunning=true;activeTimerSI=si;
  let rem=secs;
  const box=document.getElementById('tw-'+si);box.style.display='block';
  const tick=()=>{
    const m=Math.floor(rem/60),s=rem%60;
    document.getElementById('td-'+si).textContent=m+':'+String(s).padStart(2,'0');
    document.getElementById('tf-'+si).style.width=Math.round(rem/secs*100)+'%';
    if(rem<=0){clearTimer();box.style.display='none';}
    rem--;
  };
  tick();timerInterval=setInterval(tick,1000);
}
function clearTimer(){if(timerInterval){clearInterval(timerInterval);timerInterval=null;}timerRunning=false;}

function collectSets(){
  const result={};
  curWorkout.sections.forEach((sec,si)=>{
    if(sec.type!=='fbb')return;
    result[si]={};
    sec.supersets.forEach((ss,ssi)=>{
      result[si][ssi]={};
      ss.exercises.forEach((ex,exi)=>{
        result[si][ssi][exi]=Array.from({length:ex.sets},(_,ri)=>({
          w:document.getElementById(`w-${si}-${ssi}-${exi}-${ri}`)?.value||'',
          r:document.getElementById(`r-${si}-${ssi}-${exi}-${ri}`)?.value||''
        }));
      });
    });
  });
  return result;
}

function finishWorkout(){
  clearTimer();
  const sets=collectSets();
  const log={date:Date.now(),rounds:{...metconRounds},sets};
  save(curKey,log);lastKey=curKey;

  const rParts=Object.entries(metconRounds).map(([si,r])=>r+' round'+(r!==1?'s':''));
  const hasFbb=curWorkout.sections.some(s=>s.type==='fbb');
  let sub=rParts.length?rParts.join(' + ')+' logged':'';
  if(hasFbb)sub+=(sub?' · ':'')+'Bodybuilding sets saved';
  document.getElementById('done-sub').textContent=sub||'Workout saved!';

  let html='';
  curWorkout.sections.forEach((sec,si)=>{
    if(sec.type==='metcon'&&metconRounds[si]!==undefined){
      html+=`<div class="log-section-title">MetCon — ${sec.duration}</div>
        <div class="log-entry"><span class="log-big">${metconRounds[si]}</span>rounds completed</div>`;
    }
    if(sec.type==='fbb'&&log.sets[si]){
      sec.supersets.forEach((ss,ssi)=>{
        html+=`<div class="log-section-title">${ss.label}</div>`;
        ss.exercises.forEach((ex,exi)=>{
          const parts=(log.sets[si]?.[ssi]?.[exi]||[])
            .map((s,ri)=>(s.w||s.r)?`Set ${ri+1}: ${s.w||'—'}lbs × ${s.r||'—'}`:null).filter(Boolean);
          if(parts.length)html+=`<div class="log-entry"><strong>${ex.name}</strong><br>${parts.join(' · ')}</div>`;
        });
      });
    }
  });
  document.getElementById('done-summary').innerHTML=html;
  showScreen('done-screen');
}

function clearLastLog(){if(lastKey){del(lastKey);lastKey=null;}goHome();}

renderHome();
</script>
</body>
</html>
